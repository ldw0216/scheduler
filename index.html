<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 학기 & 개인 일정 관리</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --main-color: #3498db; --bg-color: #f8f9fa; --border-color: #e1e8ed; --success-color: #2ecc71; --danger-color: #e74c3c; --long-color: #9b59b6; --general-color: #7f8c8d; --preset-color: #6c5ce7; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-color); margin: 0; padding: 15px; color: #2c3e50; padding-bottom: 100px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); }
        
        /* 대시보드 */
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .widget-card { background: #fff; border: 1px solid var(--border-color); padding: 12px; border-radius: 12px; text-align: center; }
        .widget-value { font-size: 1.2em; font-weight: bold; color: var(--main-color); }

        /* 프리셋 및 과목 추가 섹션 */
        .admin-section { background: #ffffff; border: 2px solid var(--main-color); padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .input-group { display: flex; gap: 8px; margin-bottom: 15px; }
        .input-group input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        .btn-add-sub { background: var(--main-color); color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .preset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
        .preset-card { background: #f8f9fa; border: 1px solid #ddd; padding: 10px; border-radius: 10px; text-align: center; position: relative; }
        .btn-preset-save { background: var(--success-color); color: white; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .btn-preset-load { background: var(--preset-color); color: white; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .btn-preset-del { position: absolute; top: -5px; right: -5px; background: var(--danger-color); color: white; border: none; width: 18px; height: 18px; border-radius: 50%; font-size: 10px; cursor: pointer; }

        /* 탭 및 카드 */
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 2px solid var(--border-color); }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; cursor: pointer; font-weight: bold; color: #7f8c8d; }
        .tab-btn.active { color: var(--main-color); border-bottom: 3px solid var(--main-color); }
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .subject-card { border: 1px solid var(--border-color); padding: 20px; border-radius: 15px; background: #fff; position: relative; }
        .subject-card.general { border-top: 5px solid var(--general-color); }
        .task-row { margin-bottom: 10px; padding: 10px; background: #fafafa; border-radius: 8px; border-left: 4px solid var(--main-color); }
        .task-row.general-task { border-left-color: var(--general-color); }
        
        /* 달력 */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid #eee; border-left: 1px solid #eee; }
        .calendar-day { min-height: 100px; padding: 5px; border-right: 1px solid #eee; border-bottom: 1px solid #eee; font-size: 0.8em; cursor: pointer; }
        .event-bar { font-size: 0.75em; padding: 3px 5px; margin-bottom: 2px; border-radius: 3px; color: white; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .event-task { background-color: var(--main-color); }
        .event-general { background-color: var(--general-color); }
    </style>
</head>
<body>

<div class="container">
    <div class="dashboard">
        <div class="widget-card"><h4>이행률</h4><div class="widget-value" id="progress-text">0%</div></div>
        <div class="widget-card"><h4>오늘 마감</h4><div class="widget-value" id="today-count" style="color:var(--danger-color)">0</div></div>
        <div class="widget-card"><h4>남은 일정</h4><div class="widget-value" id="remaining-count">0</div></div>
    </div>

    <div class="admin-section">
        <div class="input-group">
            <input type="text" id="new-sub-input" placeholder="새 과목 명을 입력하세요 (예: 자료구조)">
            <button class="btn-add-sub" onclick="addSubject()">과목 추가</button>
        </div>
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <strong style="font-size: 0.9em; color: var(--preset-color);">💾 과목 구성 프리셋</strong>
            <button onclick="addPresetSlot()" style="background:none; border: 1px solid #ddd; padding: 2px 8px; border-radius: 5px; font-size: 0.8em; cursor:pointer;">+ 슬롯 추가</button>
        </div>
        <div class="preset-grid" id="preset-container"></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="tab-list" onclick="showTab('list')">📋 일정 리스트</button>
        <button class="tab-btn" id="tab-cal" onclick="showTab('cal')">📅 스마트 달력</button>
    </div>

    <div id="list-section" class="content-section active">
        <div id="subject-container" class="grid-layout"></div>
    </div>

    <div id="cal-section" class="content-section">
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px;">
            <button onclick="changeMonth(-1)" style="border:none; background:none; cursor:pointer; font-size:1.5em;">◀</button>
            <h2 id="current-month-display"></h2>
            <button onclick="changeMonth(1)" style="border:none; background:none; cursor:pointer; font-size:1.5em;">▶</button>
        </div>
        <div class="calendar-grid" id="calendar-grid"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBFgo6A1AzR1XOF_xBPDcsAqbD-Otg8-vk",
        authDomain: "collage-scheduler.firebaseapp.com",
        databaseURL: "https://collage-scheduler-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "collage-scheduler",
        storageBucket: "collage-scheduler.appspot.com",
        messagingSenderId: "453104339634",
        appId: "1:453104339634:web:61fa883b7aad617d6917ab"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let cloudData = {}, subjectList = {}, presets = {}, currentDate = new Date();

    db.ref().on("value", (snapshot) => {
        const data = snapshot.val() || {};
        cloudData = data.assignments || {};
        subjectList = data.subjectList || {};
        presets = data.presets || {};
        
        // 일반 일정 강제 유지
        if (!Object.values(subjectList).includes("일반 일정")) {
            db.ref("subjectList/general").set("일반 일정");
        }

        renderPresetUI();
        renderSubjects();
        updateWidgets();
        if(document.getElementById('cal-section').classList.contains('active')) renderCalendar();
    });

    function showTab(type) {
        document.querySelectorAll('.content-section, .tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(type + '-section').classList.add('active');
        document.getElementById('tab-' + type).classList.add('active');
        if(type === 'cal') renderCalendar();
    }

    /* 과목 및 프리셋 관리 */
    function addSubject() {
        const input = document.getElementById('new-sub-input');
        if(!input.value) return;
        db.ref("subjectList/sub" + Date.now()).set(input.value);
        input.value = '';
    }

    function renderPresetUI() {
        const container = document.getElementById('preset-container');
        container.innerHTML = '';
        Object.entries(presets).forEach(([pid, pData]) => {
            const card = document.createElement('div');
            card.className = 'preset-card';
            card.innerHTML = `
                <button class="btn-preset-del" onclick="db.ref('presets/${pid}').remove()">✕</button>
                <input type="text" value="${pData.name}" style="width:90%; border:none; background:transparent; text-align:center; font-size:0.8em; font-weight:bold;" onchange="db.ref('presets/${pid}/name').set(this.value)">
                <div style="display:flex; justify-content:center; gap:5px; margin-top:5px;">
                    <button class="btn-preset-save" onclick="saveToPreset('${pid}')">저장</button>
                    <button class="btn-preset-load" onclick="loadFromPreset('${pid}')">로드</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function addPresetSlot() { db.ref('presets/p' + Date.now()).set({ name: "새 프리셋", subjects: [] }); }
    function saveToPreset(pid) { 
        db.ref(`presets/${pid}/subjects`).set(Object.values(subjectList));
        alert("현재 과목 구성이 저장되었습니다.");
    }
    function loadFromPreset(pid) {
        const pData = presets[pid];
        if(!pData.subjects) return;
        if(confirm(`'${pData.name}' 구성을 불러오시겠습니까? 현재 과목이 모두 바뀝니다.`)) {
            db.ref("subjectList").remove();
            pData.subjects.forEach((name, idx) => {
                const id = name === "일반 일정" ? "general" : "sub" + (Date.now() + idx);
                db.ref("subjectList/" + id).set(name);
            });
        }
    }

    /* 리스트 렌더링 */
    function renderSubjects() {
        const container = document.getElementById('subject-container');
        container.innerHTML = '';
        const sortedKeys = Object.keys(subjectList).sort((a, b) => a === 'general' ? -1 : 1);

        sortedKeys.forEach(subId => {
            const isGeneral = subId === 'general';
            const card = document.createElement('div');
            card.className = `subject-card ${isGeneral ? 'general' : ''}`;
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                    <strong>${subjectList[subId]}</strong>
                    ${!isGeneral ? `<button onclick="if(confirm('과목 삭제?')) db.ref('subjectList/${subId}').remove()" style="border:none; background:none; color:#ccc; cursor:pointer;">✕</button>` : ''}
                </div>
                <div id="tasks-${subId}"></div>
                <button onclick="addTask('${subId}')" style="width:100%; padding:8px; border:1px dashed #ddd; background:#f9f9f9; border-radius:8px; cursor:pointer; margin-top:10px; font-size:0.85em;">+ 항목 추가</button>
            `;
            container.appendChild(card);

            Object.entries(cloudData).filter(([id]) => id.startsWith(subId)).forEach(([id, t]) => {
                const dDay = getDDay(t.date_end || t.date);
                const isUrgent = dDay !== null && dDay <= 5 && !t.checked;
                const row = document.createElement('div');
                row.className = `task-row ${isUrgent ? 'urgent' : ''} ${isGeneral ? 'general-task' : ''}`;
                row.innerHTML = `
                    <div style="display:flex; align-items:center; gap:8px;">
                        <input type="checkbox" ${t.checked ? 'checked' : ''} onchange="db.ref('assignments/${id}/checked').set(this.checked)">
                        ${dDay !== null && !t.checked ? `<span style="background:${isUrgent ? '#e74c3c' : (isGeneral ? '#95a5a6' : '#3498db')}; color:white; font-size:10px; padding:2px 5px; border-radius:3px;">D-${dDay === 0 ? 'Day' : dDay}</span>` : ''}
                        <input type="text" value="${t.text}" style="flex:1; border:none; outline:none; font-weight:bold; background:transparent;" onchange="db.ref('assignments/${id}/text').set(this.value)">
                        <button onclick="db.ref('assignments/${id}').remove()" style="border:none; background:none; cursor:pointer; font-size:12px;">🗑️</button>
                    </div>
                    <div style="display:flex; gap:5px; margin-top:5px; padding-left: 20px;">
                        <input type="date" value="${t.date || ''}" style="width:45%; border:none; font-size:0.75em; color:#888;" onchange="db.ref('assignments/${id}/date').set(this.value)">
                        <input type="date" value="${t.date_end || ''}" style="width:45%; border:none; font-size:0.75em; color:#888;" onchange="db.ref('assignments/${id}/date_end').set(this.value)">
                    </div>
                `;
                document.getElementById(`tasks-${subId}`).appendChild(row);
            });
        });
    }

    /* 달력 기능 */
    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';
        const y = currentDate.getFullYear(), m = currentDate.getMonth();
        document.getElementById('current-month-display').innerText = `${y}년 ${m + 1}월`;
        const firstDay = new Date(y, m, 1).getDay();
        const lastDate = new Date(y, m + 1, 0).getDate();

        for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div')).className = 'calendar-day';
        
        for (let d = 1; d <= lastDate; d++) {
            const dayDiv = document.createElement('div');
            dayDiv.className = 'calendar-day';
            const fullDate = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            
            dayDiv.onclick = (e) => {
                if (e.target !== dayDiv) return;
                const taskName = prompt(`[${fullDate}] 일반 일정을 입력하세요:`);
                if (taskName) {
                    db.ref("assignments/generalt" + Date.now()).set({
                        text: taskName, date: fullDate, date_end: fullDate, checked: false
                    });
                }
            };

            dayDiv.innerHTML = `<strong>${d}</strong>`;

            Object.entries(cloudData).forEach(([id, t]) => {
                if(!t.text || (!t.date && !t.date_end)) return;
                const start = new Date(t.date || t.date_end);
                const end = new Date(t.date_end || t.date);
                start.setHours(0,0,0,0); end.setHours(0,0,0,0);
                const current = new Date(fullDate);
                current.setHours(0,0,0,0);
                
                if (current >= start && current <= end) {
                    const bar = document.createElement('div');
                    const isGeneral = id.includes('general');
                    bar.className = `event-bar ${isGeneral ? 'event-general' : 'event-task'}`;
                    if(t.checked) bar.style.opacity = "0.3";
                    if (current.getTime() === start.getTime() || d === 1) bar.innerText = t.text;
                    else bar.innerHTML = '&nbsp;';
                    dayDiv.appendChild(bar);
                }
            });
            grid.appendChild(dayDiv);
        }
    }

    function addTask(subId) { db.ref("assignments/" + subId + 't' + Date.now()).set({text: "새 항목", date: "", date_end: "", checked: false}); }
    function changeMonth(v) { currentDate.setMonth(currentDate.getMonth() + v); renderCalendar(); }
    function updateWidgets() {
        let total = 0, completed = 0, today = 0, remain = 0, todayStr = new Date().toISOString().split('T')[0];
        Object.values(cloudData).forEach(t => { 
            if(t.text) { total++; if(t.checked) completed++; else { remain++; if(t.date === todayStr || t.date_end === todayStr) today++; } } 
        });
        const percent = total === 0 ? 0 : Math.round((completed / total) * 100);
        document.getElementById('progress-text').innerText = percent + '%';
        document.getElementById('today-count').innerText = today;
        document.getElementById('remaining-count').innerText = remain;
    }
</script>
</body>
</html>
