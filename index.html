<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대학교 과제 및 일정 스마트 관리</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --main-color: #3498db; --bg-color: #f8f9fa; --border-color: #e1e8ed; --success-color: #2ecc71; --danger-color: #e74c3c; --long-color: #9b59b6; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-color); margin: 0; padding: 15px; color: #2c3e50; padding-bottom: 100px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); }
        
        /* 대시보드 */
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .widget-card { background: #fff; border: 1px solid var(--border-color); padding: 12px; border-radius: 12px; text-align: center; }
        .widget-value { font-size: 1.2em; font-weight: bold; color: var(--main-color); }
        .mini-progress-container { background: #eee; height: 6px; border-radius: 3px; margin: 8px auto 0; width: 80%; overflow: hidden; }
        .mini-progress-fill { background: linear-gradient(90deg, #3498db, #2ecc71); height: 100%; width: 0%; transition: width 0.5s ease; }

        /* 탭 메뉴 */
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 2px solid var(--border-color); }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; cursor: pointer; font-weight: bold; color: #7f8c8d; }
        .tab-btn.active { color: var(--main-color); border-bottom: 3px solid var(--main-color); }
        .content-section { display: none; }
        .content-section.active { display: block; }

        /* 과제 리스트 */
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .subject-card { border: 1px solid var(--border-color); padding: 20px; border-radius: 15px; background: #fff; }
        .task-row { margin-bottom: 10px; padding: 10px; background: #fafafa; border-radius: 8px; border-left: 4px solid var(--main-color); position: relative; }
        .task-row.urgent { border-left-color: var(--danger-color); background: #fff5f5; }
        .d-day-badge { font-size: 0.7em; font-weight: bold; padding: 2px 6px; border-radius: 4px; color: white; min-width: 35px; text-align: center; }
        .btn-task-del { background: none; border: none; color: #ccc; cursor: pointer; font-size: 14px; padding: 5px; }

        /* 달력 - 클릭 가능 스타일 추가 */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid #eee; border-left: 1px solid #eee; background: #fff; }
        .calendar-day { min-height: 110px; padding: 5px; border-right: 1px solid #eee; border-bottom: 1px solid #eee; font-size: 0.8em; position: relative; cursor: pointer; transition: background 0.2s; }
        .calendar-day:hover { background-color: #f0f7ff; }
        .calendar-day strong { display: block; margin-bottom: 5px; }
        .event-bar { font-size: 0.75em; padding: 3px 5px; margin-bottom: 2px; border-radius: 3px; color: white; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .event-task { background-color: var(--main-color); }
        .event-multi { background-color: var(--long-color); border-radius: 0; margin-left: -6px; margin-right: -6px; }

        /* 프리셋 */
        .preset-section { background: #ffffff; border: 2px solid #3498db; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .preset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-top: 10px; }
        .preset-card { background: #f8f9fa; border: 1px solid #ddd; padding: 12px; border-radius: 12px; text-align: center; position: relative; }
        .btn-preset-del { position: absolute; top: -8px; right: -8px; background: var(--danger-color); color: white; border: 2px solid white; width: 20px; height: 20px; border-radius: 50%; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="dashboard">
        <div class="widget-card">
            <h4>이행률</h4>
            <div class="widget-value" id="progress-text">0%</div>
            <div class="mini-progress-container"><div id="progress-bar" class="mini-progress-fill"></div></div>
        </div>
        <div class="widget-card"><h4>오늘 마감</h4><div class="widget-value" id="today-count" style="color:var(--danger-color)">0</div></div>
        <div class="widget-card"><h4>남은 과제</h4><div class="widget-value" id="remaining-count">0</div></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="tab-list" onclick="showTab('list')">📋 과제 리스트</button>
        <button class="tab-btn" id="tab-cal" onclick="showTab('cal')">📅 스마트 달력</button>
    </div>

    <div id="list-section" class="content-section active">
        <div class="preset-section">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <strong>✨ 과목 프리셋 설정</strong>
                <button onclick="addPresetSlot()" style="background: #6c5ce7; color: white; border: none; padding: 5px 12px; border-radius: 8px; cursor: pointer;">+ 슬롯 추가</button>
            </div>
            <div class="preset-grid" id="preset-container"></div>
        </div>
        <div id="subject-container" class="grid-layout"></div>
    </div>

    <div id="cal-section" class="content-section">
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px;">
            <button onclick="changeMonth(-1)" style="border:none; background:none; cursor:pointer; font-size:1.5em;">◀</button>
            <h2 id="current-month-display"></h2>
            <button onclick="changeMonth(1)" style="border:none; background:none; cursor:pointer; font-size:1.5em;">▶</button>
        </div>
        <p style="text-align: center; font-size: 0.8em; color: #888; margin-top: -10px;">💡 날짜 칸을 클릭하면 일정을 바로 추가할 수 있습니다.</p>
        <div class="calendar-grid" id="calendar-grid"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBFgo6A1AzR1XOF_xBPDcsAqbD-Otg8-vk",
        authDomain: "collage-scheduler.firebaseapp.com",
        databaseURL: "https://collage-scheduler-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "collage-scheduler",
        storageBucket: "collage-scheduler.appspot.com",
        messagingSenderId: "453104339634",
        appId: "1:453104339634:web:61fa883b7aad617d6917ab"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let cloudData = {}, subjectList = {}, presets = {}, currentDate = new Date();

    db.ref().on("value", (snapshot) => {
        const data = snapshot.val() || {};
        cloudData = data.assignments || {};
        subjectList = data.subjectList || {};
        presets = data.presets || {};
        renderPresetUI();
        renderSubjects();
        updateWidgets();
        if(document.getElementById('cal-section').classList.contains('active')) renderCalendar();
    });

    function showTab(type) {
        document.querySelectorAll('.content-section, .tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(type + '-section').classList.add('active');
        document.getElementById('tab-' + type).classList.add('active');
        if(type === 'cal') renderCalendar();
    }

    /* 과제 리스트 렌더링 */
    function renderSubjects() {
        const container = document.getElementById('subject-container');
        container.innerHTML = '';
        Object.entries(subjectList).forEach(([subId, subName]) => {
            const card = document.createElement('div');
            card.className = 'subject-card';
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <input type="text" value="${subName}" style="border:none; font-weight:bold; outline:none;" onchange="db.ref('subjectList/${subId}').set(this.value)">
                    <button onclick="if(confirm('과목 삭제?')) db.ref('subjectList/${subId}').remove()" style="border:none; background:none; color:#ccc; cursor:pointer;">✕</button>
                </div>
                <div id="tasks-${subId}"></div>
                <button onclick="addTask('${subId}')" style="width:100%; padding:8px; border:1px dashed #3498db; background:#f0f7ff; color:#3498db; border-radius:8px; cursor:pointer; margin-top:10px;">+ 과제 추가</button>
            `;
            container.appendChild(card);

            const taskIds = Object.keys(cloudData).filter(id => id.startsWith(subId)).sort();
            taskIds.forEach(id => {
                const t = cloudData[id];
                const dDay = getDDay(t.date_end || t.date);
                const isUrgent = dDay !== null && dDay <= 5 && !t.checked;

                const row = document.createElement('div');
                row.className = `task-row ${isUrgent ? 'urgent' : ''}`;
                row.innerHTML = `
                    <div style="display:flex; align-items:center; gap:8px;">
                        <input type="checkbox" ${t.checked ? 'checked' : ''} onchange="db.ref('assignments/${id}/checked').set(this.checked)">
                        ${dDay !== null && !t.checked ? `<span class="d-day-badge" style="background:${isUrgent ? '#e74c3c' : '#95a5a6'}">D-${dDay === 0 ? 'Day' : dDay}</span>` : ''}
                        <input type="text" value="${t.text}" style="flex:1; border:none; outline:none; font-weight:bold; background:transparent;" onchange="db.ref('assignments/${id}/text').set(this.value)">
                        <button class="btn-task-del" onclick="if(confirm('삭제?')) db.ref('assignments/${id}').remove()">🗑️</button>
                    </div>
                    <div style="display:flex; gap:5px; margin-top:5px; padding-left: 20px;">
                        <input type="date" value="${t.date || ''}" style="width:45%; border:none; font-size:0.75em; color:#888;" onchange="db.ref('assignments/${id}/date').set(this.value)">
                        <span style="font-size:0.7em; color:#ccc;">~</span>
                        <input type="date" value="${t.date_end || ''}" style="width:45%; border:none; font-size:0.75em; color:#888;" onchange="db.ref('assignments/${id}/date_end').set(this.value)">
                    </div>
                `;
                document.getElementById(`tasks-${subId}`).appendChild(row);
            });
        });
    }

    /* 스마트 달력 렌더링 및 클릭 추가 기능 */
    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';
        const y = currentDate.getFullYear(), m = currentDate.getMonth();
        document.getElementById('current-month-display').innerText = `${y}년 ${m + 1}월`;
        
        const firstDay = new Date(y, m, 1).getDay();
        const lastDate = new Date(y, m + 1, 0).getDate();

        for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div')).className = 'calendar-day';
        
        for (let d = 1; d <= lastDate; d++) {
            const dayDiv = document.createElement('div');
            dayDiv.className = 'calendar-day';
            const fullDate = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const dateObj = new Date(fullDate);
            dateObj.setHours(0,0,0,0);

            // [추가] 날짜 칸 클릭 시 일정 추가 로직
            dayDiv.onclick = (e) => {
                // 일정 바를 클릭했을 때 중복 실행 방지
                if (e.target !== dayDiv && e.target.tagName !== 'STRONG') return;

                const subIds = Object.keys(subjectList);
                if (subIds.length === 0) return alert("먼저 과제 리스트 탭에서 과목을 하나 이상 추가해주세요!");

                // 과목 선택 메시지 구성
                let msg = "일정을 추가할 과목의 번호를 선택하세요:\n";
                subIds.forEach((id, index) => { msg += `${index + 1}. ${subjectList[id]}\n`; });
                
                const choice = prompt(msg, "1");
                if (!choice) return;
                
                const selectedIdx = parseInt(choice) - 1;
                if (isNaN(selectedIdx) || !subIds[selectedIdx]) return alert("올바른 번호를 선택해주세요.");

                const taskName = prompt(`[${fullDate}] 추가할 일정을 입력하세요:`);
                if (taskName) {
                    const targetSubId = subIds[selectedIdx];
                    db.ref("assignments/" + targetSubId + 't' + Date.now()).set({
                        text: taskName,
                        date: fullDate,
                        date_end: fullDate,
                        checked: false
                    });
                }
            };

            dayDiv.innerHTML = `<strong>${d}</strong>`;

            // 일정 표시 로직
            Object.values(cloudData).forEach(t => {
                if(!t.text || (!t.date && !t.date_end)) return;
                const start = t.date ? new Date(t.date) : new Date(t.date_end);
                const end = t.date_end ? new Date(t.date_end) : new Date(t.date);
                start.setHours(0,0,0,0); end.setHours(0,0,0,0);
                
                if (dateObj >= start && dateObj <= end) {
                    const bar = document.createElement('div');
                    const isMulti = start.getTime() !== end.getTime();
                    bar.className = `event-bar ${isMulti ? 'event-multi' : 'event-task'}`;
                    if(t.checked) bar.style.opacity = "0.3";
                    if (dateObj.getTime() === start.getTime() || d === 1) {
                        bar.innerText = '📝 ' + t.text;
                    } else {
                        bar.innerHTML = '&nbsp;';
                    }
                    dayDiv.appendChild(bar);
                }
            });
            grid.appendChild(dayDiv);
        }
    }

    /* 공통 함수 */
    function getDDay(target) {
        if(!target) return null;
        const targetDate = new Date(target); targetDate.setHours(0,0,0,0);
        const today = new Date(); today.setHours(0,0,0,0);
        const diff = targetDate - today;
        const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
        return days < 0 ? null : days;
    }
    function addTask(subId) { db.ref("assignments/" + subId + 't' + Date.now()).set({text: "새 과제", date: "", date_end: "", checked: false}); }
    function changeMonth(v) { currentDate.setMonth(currentDate.getMonth() + v); renderCalendar(); }
    function updateWidgets() {
        let total = 0, completed = 0, today = 0, remain = 0, todayStr = new Date().toISOString().split('T')[0];
        Object.values(cloudData).forEach(t => { 
            if(t.text) { total++; if(t.checked) completed++; else { remain++; if(t.date === todayStr || t.date_end === todayStr) today++; } } 
        });
        const percent = total === 0 ? 0 : Math.round((completed / total) * 100);
        document.getElementById('progress-text').innerText = percent + '%';
        document.getElementById('progress-bar').style.width = percent + '%';
        document.getElementById('today-count').innerText = today;
        document.getElementById('remaining-count').innerText = remain;
    }
    function renderPresetUI() {
        const container = document.getElementById('preset-container');
        if(!container) return; container.innerHTML = '';
        Object.entries(presets).forEach(([pid, pData]) => {
            const card = document.createElement('div'); card.className = 'preset-card';
            card.innerHTML = `<button class="btn-preset-del" onclick="db.ref('presets/${pid}').remove()">✕</button>
                <div style="font-size:0.85em; font-weight:bold; margin-bottom:5px;">${pData.name}</div>
                <div style="display:flex; justify-content:center; gap:3px;">
                    <button onclick="saveToPreset('${pid}')" style="font-size:10px; padding:2px 5px; cursor:pointer;">저장</button>
                    <button onclick="loadFromPreset('${pid}')" style="font-size:10px; padding:2px 5px; cursor:pointer;">로드</button>
                </div>`;
            container.appendChild(card);
        });
    }
    function addPresetSlot() { const name = prompt("프리셋 이름?"); if(name) db.ref('presets/p' + Date.now()).set({ name: name, subjects: [] }); }
    function saveToPreset(pid) { db.ref(`presets/${pid}/subjects`).set(Object.values(subjectList)); alert("저장됨"); }
    function loadFromPreset(pid) {
        const pData = presets[pid];
        if(pData && pData.subjects && confirm("현재 과목을 대체할까요?")) {
            db.ref("subjectList").remove(); db.ref("assignments").remove();
            pData.subjects.forEach((name, idx) => db.ref("subjectList/sub" + (Date.now() + idx)).set(name));
        }
    }
</script>
</body>
</html>
