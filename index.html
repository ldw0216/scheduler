<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학기 일정 통합 매니저</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --main-color: #3498db; --bg-color: #f8f9fa; --border-color: #e1e8ed; --success-color: #2ecc71; --danger-color: #e74c3c; --long-color: #9b59b6; --personal-color: #f39c12; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-color); margin: 0; padding: 15px; color: #2c3e50; padding-bottom: 100px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); }
        
        /* 대시보드 */
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .widget-card { background: #fff; border: 1px solid var(--border-color); padding: 12px; border-radius: 12px; text-align: center; }
        .widget-value { font-size: 1.2em; font-weight: bold; color: var(--main-color); }
        .mini-progress-wrapper { background: #eee; height: 6px; border-radius: 3px; margin: 8px auto 0; width: 80%; overflow: hidden; }
        .mini-progress-fill { background: linear-gradient(90deg, #3498db, #2ecc71); height: 100%; width: 0%; transition: width 0.5s ease; }

        /* 탭 및 프리셋 */
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 2px solid var(--border-color); }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; cursor: pointer; font-weight: bold; color: #7f8c8d; }
        .tab-btn.active { color: var(--main-color); border-bottom: 3px solid var(--main-color); }
        .preset-section { background: #fdfdfd; border: 1px dashed var(--main-color); padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .preset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-top: 10px; }
        .preset-card { background: white; border: 1px solid #ddd; padding: 10px; border-radius: 10px; text-align: center; position: relative; }

        /* 과제 리스트 */
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .subject-card { border: 1px solid var(--border-color); padding: 20px; border-radius: 15px; background: #fff; }
        .task-row { margin-bottom: 10px; padding: 10px; background: #fafafa; border-radius: 8px; border-left: 4px solid var(--main-color); }
        .task-row.urgent { border-left-color: var(--danger-color); background: #fff5f5; }
        .d-day-badge { font-size: 0.65em; font-weight: bold; padding: 2px 5px; border-radius: 4px; min-width: 40px; text-align: center; display: inline-block; }

        /* 달력 */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid #eee; border-left: 1px solid #eee; }
        .calendar-day { min-height: 100px; padding: 5px; border-right: 1px solid #eee; border-bottom: 1px solid #eee; font-size: 0.8em; cursor: pointer; }
        .event-bar { font-size: 0.75em; padding: 3px 5px; margin-bottom: 2px; border-radius: 3px; color: white; overflow: hidden; white-space: nowrap; position: relative; }
        .event-task { background-color: var(--main-color); }
        .event-personal { background-color: var(--personal-color); cursor: pointer; }
        .event-personal:hover { filter: brightness(1.1); }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align: center; margin-bottom: 20px;">
        <h1 style="font-size: 1.4em; color: #2c3e50;">학기 일정 통합 매니저</h1>
    </header>

    <div class="dashboard">
        <div class="widget-card">
            <h4>이행률</h4>
            <div class="widget-value" id="progress-text">0%</div>
            <div class="mini-progress-wrapper"><div id="progress-bar" class="mini-progress-fill"></div></div>
        </div>
        <div class="widget-card"><h4>오늘 마감</h4><div class="widget-value" id="today-count" style="color:var(--danger-color)">0</div></div>
        <div class="widget-card"><h4>남은 과제</h4><div class="widget-value" id="remaining-count">0</div></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="tab-list" onclick="showTab('list')">📋 과제 리스트</button>
        <button class="tab-btn" id="tab-cal" onclick="showTab('cal')">📅 스마트 달력</button>
    </div>

    <div id="list-section" class="content-section active">
        <div class="preset-section">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <strong>📂 과목 프리셋</strong>
                <button onclick="addPresetSlot()" style="background:var(--long-color); color:white; border:none; padding:5px 12px; border-radius:6px; cursor:pointer; font-size:0.8em;">+ 슬롯 추가</button>
            </div>
            <div class="preset-grid" id="preset-container"></div>
            <div style="margin-top: 15px; display:flex; gap:5px;">
                <input type="text" id="direct-sub-input" placeholder="새 과목 바로 추가" style="flex:1; padding:10px; border:1px solid #ddd; border-radius:8px;">
                <button onclick="addSubjectDirect()" style="background:var(--main-color); color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;">과목 추가</button>
            </div>
        </div>
        <div class="grid-layout" id="subject-container"></div>
    </div>

    <div id="cal-section" class="content-section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <button onclick="changeMonth(-1)" style="border:none; background:none; cursor:pointer; font-size:1.2em;">◀</button>
            <h2 id="current-month-display" style="margin:0; font-size: 1.1em;"></h2>
            <button onclick="changeMonth(1)" style="border:none; background:none; cursor:pointer; font-size:1.2em;">▶</button>
        </div>
        <div class="calendar-grid" id="calendar-grid"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBFgo6A1AzR1XOF_xBPDcsAqbD-Otg8-vk",
        authDomain: "collage-scheduler.firebaseapp.com",
        databaseURL: "https://collage-scheduler-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "collage-scheduler",
        storageBucket: "collage-scheduler.appspot.com",
        messagingSenderId: "453104339634",
        appId: "1:453104339634:web:61fa883b7aad617d6917ab"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let cloudData = {}, subjectList = {}, presets = {}, currentDate = new Date();

    db.ref().on("value", (snapshot) => {
        const data = snapshot.val() || {};
        cloudData = data.assignments || {};
        subjectList = data.subjectList || {};
        presets = data.presets || {};
        renderPresetUI();
        renderSubjects();
        updateWidgets();
        if(document.getElementById('cal-section').classList.contains('active')) renderCalendar();
    });

    function showTab(type) {
        document.querySelectorAll('.content-section, .tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(type + '-section').classList.add('active');
        document.getElementById('tab-' + type).classList.add('active');
        if(type === 'cal') renderCalendar();
    }

    /* 프리셋 UI (요청대로 유지) */
    function renderPresetUI() {
        const container = document.getElementById('preset-container');
        container.innerHTML = '';
        Object.entries(presets).forEach(([pid, pData]) => {
            const card = document.createElement('div'); card.className = 'preset-card';
            card.innerHTML = `<button onclick="db.ref('presets/${pid}').remove()" style="position:absolute; top:2px; right:2px; border:none; background:none; cursor:pointer; color:#ccc; font-size:10px;">✕</button>
                <input type="text" value="${pData.name}" style="width:80%; border:none; text-align:center; font-size:0.85em; margin-bottom:5px;" onchange="db.ref('presets/${pid}/name').set(this.value)">
                <div style="display:flex; gap:3px; justify-content:center;">
                    <button onclick="saveToPreset('${pid}')" style="background:var(--success-color); color:white; border:none; font-size:9px; padding:3px 5px; border-radius:3px;">저장</button>
                    <button onclick="loadFromPreset('${pid}')" style="background:var(--main-color); color:white; border:none; font-size:9px; padding:3px 5px; border-radius:3px;">불러오기</button>
                </div>`;
            container.appendChild(card);
        });
    }
    function addPresetSlot() { db.ref('presets/p' + Date.now()).set({ name: "새 프리셋", subjects: [] }); }
    function saveToPreset(pid) { db.ref(`presets/${pid}/subjects`).set(Object.values(subjectList)); alert("현재 과목 구성이 저장되었습니다."); }
    function loadFromPreset(pid) {
        if(confirm("기존 과목이 삭제되고 프리셋을 불러옵니다. 진행할까요?")) {
            const subs = presets[pid].subjects || [];
            db.ref("subjectList").remove(); db.ref("assignments").remove();
            subs.forEach((name, i) => db.ref("subjectList/sub" + (Date.now() + i)).set(name));
        }
    }

    function renderSubjects() {
        const container = document.getElementById('subject-container');
        container.innerHTML = '';
        Object.entries(subjectList).forEach(([subId, subName]) => {
            const card = document.createElement('div'); card.className = 'subject-card';
            card.innerHTML = `<div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <input type="text" value="${subName}" style="border:none; font-weight:bold; font-size:1.1em; outline:none;" onchange="db.ref('subjectList/${subId}').set(this.value)">
                <button onclick="db.ref('subjectList/${subId}').remove()" style="border:none; background:none; color:#ccc; cursor:pointer;">✕</button>
            </div><div id="tasks-${subId}"></div>
            <button onclick="addTask('${subId}')" style="width:100%; padding:10px; border:1px dashed #3498db; background:#f0f7ff; color:#3498db; border-radius:10px; cursor:pointer; font-weight:bold; margin-top:10px;">+ 과제 추가</button>`;
            container.appendChild(card);

            Object.entries(cloudData).filter(([id]) => id.startsWith(subId)).forEach(([id, t]) => {
                const dDay = getDDay(t.date_end || t.date);
                const isUrgent = dDay !== null && dDay <= 5 && !t.checked;
                
                // [변경] 마감일 텍스트 생성
                let dDayBadge = "";
                if (dDay !== null && !t.checked) {
                    let color = "#95a5a6", text = `D-${dDay}`;
                    if (dDay === 0) { color = "var(--danger-color)"; text = "D-Day"; }
                    else if (dDay < 0) { color = "#000"; text = "종료"; }
                    else if (isUrgent) { color = "var(--danger-color)"; }
                    dDayBadge = `<span class="d-day-badge" style="background:${color}; color:white; margin-right:8px;">${text}</span>`;
                }

                const row = document.createElement('div'); row.className = `task-row ${isUrgent ? 'urgent' : ''}`;
                row.innerHTML = `<div style="display:flex; align-items:center;">
                    <input type="checkbox" ${t.checked ? 'checked' : ''} onchange="db.ref('assignments/${id}/checked').set(this.checked)" style="margin-right:10px;">
                    ${dDayBadge}
                    <input type="text" value="${t.text}" style="flex:1; border:none; outline:none; font-weight:bold; background:transparent;" onchange="db.ref('assignments/${id}/text').set(this.value)">
                    <button onclick="db.ref('assignments/${id}').remove()" style="border:none; background:none; cursor:pointer; color:#ddd; font-size:12px;">✕</button>
                </div><div style="display:flex; gap:5px; margin-top:8px;">
                    <input type="date" value="${t.date || ''}" style="width:45%; border:none; font-size:0.75em; color:#888;" onchange="db.ref('assignments/${id}/date').set(this.value)">
                    <span style="color:#eee; font-size:10px;">~</span>
                    <input type="date" value="${t.date_end || ''}" style="width:45%; border:none; font-size:0.75em; color:#888;" onchange="db.ref('assignments/${id}/date_end').set(this.value)">
                </div>`;
                document.getElementById(`tasks-${subId}`).appendChild(row);
            });
        });
    }

    function addTask(subId) { db.ref("assignments/" + subId + 't' + Date.now()).set({text: "새 과제", date: "", date_end: "", checked: false}); }
    function addSubjectDirect() {
        const val = document.getElementById('direct-sub-input').value;
        if(val) { db.ref("subjectList/sub" + Date.now()).set(val); document.getElementById('direct-sub-input').value = ''; }
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid'); grid.innerHTML = '';
        const y = currentDate.getFullYear(), m = currentDate.getMonth();
        document.getElementById('current-month-display').innerText = `${y}년 ${m + 1}월`;
        const firstDay = new Date(y, m, 1).getDay(), lastDate = new Date(y, m + 1, 0).getDate();

        for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div')).className = 'calendar-day';
        
        for (let d = 1; d <= lastDate; d++) {
            const dayDiv = document.createElement('div'); dayDiv.className = 'calendar-day';
            const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const dateObj = new Date(dateStr); dateObj.setHours(0,0,0,0);

            dayDiv.onclick = (e) => {
                if (e.target !== dayDiv && e.target.tagName !== 'STRONG') return;
                const taskName = prompt(`[${dateStr}] 추가할 개인 일정을 입력하세요:`);
                if (taskName) {
                    const endDate = prompt("종료 날짜(YYYY-MM-DD) 또는 빈칸:", dateStr);
                    db.ref("assignments/personal_t" + Date.now()).set({ text: taskName, date: dateStr, date_end: endDate || dateStr, checked: false, type: 'personal' });
                }
            };

            dayDiv.innerHTML = `<strong>${d}</strong>`;

            Object.entries(cloudData).forEach(([id, t]) => {
                const start = t.date ? new Date(t.date) : null;
                const end = t.date_end ? new Date(t.date_end) : (start || null);
                if (start && end) {
                    start.setHours(0,0,0,0); end.setHours(0,0,0,0);
                    if (dateObj >= start && dateObj <= end && t.text) {
                        const bar = document.createElement('div');
                        const isPersonal = t.type === 'personal';
                        bar.className = `event-bar ${isPersonal ? 'event-personal' : 'event-task'}`;
                        if(t.checked) bar.style.opacity = "0.3";
                        
                        bar.innerText = (isPersonal ? '📌 ' : '📝 ') + t.text;

                        // [추가] 개인 일정 클릭 시 삭제 기능
                        if(isPersonal) {
                            bar.onclick = (e) => {
                                e.stopPropagation(); // 부모 클릭(일정 추가) 방지
                                if(confirm(`'${t.text}' 일정을 삭제할까요?`)) db.ref(`assignments/${id}`).remove();
                            };
                        }
                        dayDiv.appendChild(bar);
                    }
                }
            });
            grid.appendChild(dayDiv);
        }
    }

    function getDDay(target) {
        if(!target) return null;
        const diff = new Date(target).setHours(0,0,0,0) - new Date().setHours(0,0,0,0);
        return Math.floor(diff / (1000 * 60 * 60 * 24));
    }

    function changeMonth(v) { currentDate.setMonth(currentDate.getMonth() + v); renderCalendar(); }

    function updateWidgets() {
        let total = 0, completed = 0, today = 0, remain = 0, todayStr = new Date().toISOString().split('T')[0];
        Object.values(cloudData).forEach(t => { 
            if(t.text && t.type !== 'personal') {
                total++; if(t.checked) completed++; 
                else { remain++; if(t.date <= todayStr && t.date_end >= todayStr) today++; }
            }
        });
        const percent = total === 0 ? 0 : Math.round((completed / total) * 100);
        document.getElementById('progress-text').innerText = percent + '%';
        document.getElementById('progress-bar').style.width = percent + '%';
        document.getElementById('today-count').innerText = today;
        document.getElementById('remaining-count').innerText = remain;
    }
</script>
</body>
</html>
